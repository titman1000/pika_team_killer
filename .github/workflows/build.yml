name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - "classification.py"
      - "requirements.txt"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE with PyInstaller
        run: >
          pyinstaller --onefile --windowed --name TeamKiller
          classification.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeamKiller-windows-exe
          path: dist/TeamKiller.exe
          retention-days: 30

      - name: Publish rolling "latest" release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            自動建置版本，對應 commit ${{ github.sha }}。
            下載 TeamKiller.exe 即可使用，不需要安裝 Python。
          prerelease: true
          make_latest: true
          files: dist/TeamKiller.exe
